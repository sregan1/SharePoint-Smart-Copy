name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version from csproj
        id: ver
        shell: pwsh
        run: |
          [xml]$proj = Get-Content SharePointSmartCopy/SharePointSmartCopy.csproj
          $version = $proj.Project.PropertyGroup.Version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Publish self-contained exe
        shell: pwsh
        run: |
          dotnet publish SharePointSmartCopy/SharePointSmartCopy.csproj `
            -c Release `
            --self-contained true `
            -r win-x64 `
            -o publish

      - name: Extract changelog section
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $lines   = Get-Content CHANGELOG.md
          $capture = $false
          $notes   = [System.Collections.Generic.List[string]]::new()
          foreach ($line in $lines) {
            if ($line -match "^## $([regex]::Escape($version))") { $capture = $true; continue }
            if ($capture -and $line -match '^## ') { break }
            if ($capture) { $notes.Add($line) }
          }
          # Trim leading/trailing blank lines
          while ($notes.Count -gt 0 -and $notes[0] -eq '') { $notes.RemoveAt(0) }
          while ($notes.Count -gt 0 -and $notes[$notes.Count - 1] -eq '') { $notes.RemoveAt($notes.Count - 1) }
          if ($notes.Count -eq 0) {
            $notes.Add("See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.")
          }
          $notes | Out-File -FilePath release_notes.md -Encoding utf8

      - name: Create or replace GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $tag     = "v$version"
          $zip     = "SharePointSmartCopy-$tag.zip"
          $exe     = "SharePointSmartCopy-$tag.exe"

          Compress-Archive -Path publish\* -DestinationPath $zip
          Copy-Item publish\SharePointSmartCopy.exe $exe

          # Replace existing release for this version (idempotent on re-push)
          gh release delete $tag --yes --cleanup-tag 2>$null

          gh release create $tag $zip $exe `
            --title "SharePoint Smart Copy $tag" `
            --latest `
            --notes-file release_notes.md
